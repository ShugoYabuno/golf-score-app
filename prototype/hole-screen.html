<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Score - Hole Screen Prototype</title>
  <style>
    :root {
      --bg: #f4f6f0;
      --card: #ffffff;
      --line: #d7dccb;
      --text: #1f2a1f;
      --muted: #647164;
      --accent: #1f7a4a;
      --accent-2: #dff2e7;
      --warn: #b42318;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(165deg, #eef4e8 0%, #f9fbf7 100%);
      color: var(--text);
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .phone {
      width: 390px;
      height: 844px;
      max-width: 100%;
      background: var(--bg);
      border: 1px solid #c8d0bf;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(32, 60, 36, 0.14);
      overflow: hidden;
      position: relative;
    }

    .header {
      height: 88px;
      padding: 12px 12px 10px;
      background: rgba(255,255,255,0.8);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nav-btn, .icon-btn {
      min-width: 48px;
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
    }

    .center {
      text-align: center;
      flex: 1;
    }

    .center strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
    }

    .center span {
      color: var(--muted);
      font-size: 13px;
    }

    .progress {
      margin-top: 10px;
      height: 6px;
      border-radius: 999px;
      background: #dde5d9;
      overflow: hidden;
    }

    .progress > i {
      display: block;
      height: 100%;
      width: 38.8%;
      background: linear-gradient(90deg, #5fa56f, #2d8550);
    }

    .content {
      position: absolute;
      top: 88px;
      bottom: 96px;
      left: 0;
      right: 0;
      overflow: auto;
      padding: 12px 12px 20px;
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #344434;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge-required {
      font-size: 11px;
      color: #7a2e0e;
      background: #fdebd2;
      border-radius: 999px;
      padding: 2px 8px;
    }

    .stepper {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      gap: 12px;
      align-items: center;
    }

    .step-btn {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 26px;
      cursor: pointer;
    }

    .value {
      height: 64px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #f8faf6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(72px, 1fr));
      gap: 8px;
    }

    .chips.five {
      grid-template-columns: repeat(5, minmax(56px, 1fr));
    }

    .chip {
      min-height: 52px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 15px;
      font-weight: 700;
      color: #2f3e2f;
      cursor: pointer;
    }

    .chip.active {
      border-color: #318455;
      background: var(--accent-2);
      color: #185033;
    }

    .chip.warn.active {
      border-color: #9f2d22;
      background: #fdf0ef;
      color: #7f1d1d;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field-label {
      margin: 0 0 6px;
      font-size: 12px;
      color: #516151;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .error {
      color: var(--warn);
      font-size: 12px;
      margin-top: 8px;
      font-weight: 700;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 96px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      padding: 10px 12px;
      align-items: center;
    }

    .undo {
      min-height: 56px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 700;
      color: #3f4f3f;
      cursor: pointer;
    }

    .undo[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .next {
      min-height: 56px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #1f7a4a, #16623b);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .next[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      position: absolute;
      bottom: 102px;
      right: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: #445444;
    }

    .info-panel {
      position: absolute;
      top: 90px;
      right: 12px;
      width: 260px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
      display: none;
      z-index: 5;
    }

    .info-panel.open { display: block; }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #e2e8dd;
      font-size: 13px;
      gap: 12px;
    }

    .info-row:last-child { border-bottom: 0; }

    .info-label {
      color: #516151;
      font-weight: 700;
    }

    .info-value {
      text-align: right;
      color: #1f2a1f;
      font-weight: 700;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="phone">
    <header class="header">
      <div class="row">
        <button class="nav-btn" id="prevBtn">◀</button>
        <div class="center">
          <strong id="holeTitle">Hole 7 / 18</strong>
          <span id="parText">Par 4</span>
        </div>
        <button class="icon-btn" id="settingsBtn">i</button>
      </div>
      <div class="progress"><i id="progressFill"></i></div>
    </header>

    <aside class="info-panel" id="settingsPanel">
      <div class="info-row"><span class="info-label">このラウンド</span><span class="info-value">18H</span></div>
      <div class="info-row"><span class="info-label">FWキープ</span><span class="info-value" id="fwValue">ON</span></div>
      <div class="info-row"><span class="info-label">GIR</span><span class="info-value" id="girValue">ON</span></div>
      <div class="info-row"><span class="info-label">OB</span><span class="info-value" id="obValue">ON</span></div>
      <div class="info-row"><span class="info-label">バンカーIN</span><span class="info-value" id="bunkerValue">OFF</span></div>
      <div class="info-row"><span class="info-label">パット不明</span><span class="info-value" id="puttUnknownValue">ON</span></div>
    </aside>

    <main class="content" id="content">
      <section class="card" id="strokesCard">
        <h3>打数 <span class="badge-required">必須</span></h3>
        <div class="stepper">
          <button class="step-btn" data-step="-1" data-target="strokes">-</button>
          <div class="value" id="strokesValue">-</div>
          <button class="step-btn" data-step="1" data-target="strokes">+</button>
        </div>
      </section>

      <section class="card" id="puttsCard">
        <h3>パット <span class="badge-required">必須</span></h3>
        <div class="chips five" id="puttsChips">
          <button class="chip" data-target="putts" data-value="0">0</button>
          <button class="chip" data-target="putts" data-value="1">1</button>
          <button class="chip" data-target="putts" data-value="2">2</button>
          <button class="chip" data-target="putts" data-value="3">3</button>
          <button class="chip" data-target="putts" data-value="4">4+</button>
        </div>
        <div class="chips" id="puttsUnknownArea" style="margin-top:8px; grid-template-columns:1fr;">
          <button class="chip" id="puttsUnknownBtn">不明</button>
        </div>
      </section>

      <section class="card" id="penaltyCard">
        <h3>ペナルティ <span class="badge-required">必須</span></h3>
        <div id="obBlock">
          <p class="field-label">OB</p>
          <div class="chips" id="obChips">
            <button class="chip warn" data-target="ob" data-value="0">0</button>
            <button class="chip warn" data-target="ob" data-value="1">1</button>
            <button class="chip warn" data-target="ob" data-value="2">2</button>
          </div>
          <p class="field-label" style="margin-top:10px;">その他ペナ</p>
          <div class="chips" id="otherPenaltyChips">
            <button class="chip" data-target="otherPenalty" data-value="0">0</button>
            <button class="chip" data-target="otherPenalty" data-value="1">1</button>
            <button class="chip" data-target="otherPenalty" data-value="2">2</button>
          </div>
          <p class="muted">合計は自動計算: <strong id="penaltyTotalAuto">0</strong></p>
        </div>

        <div id="penaltyOnlyBlock" class="hidden">
          <p class="field-label">ペナルティ合計</p>
          <div class="chips" id="penaltyTotalChips">
            <button class="chip" data-target="penaltyTotal" data-value="0">0</button>
            <button class="chip" data-target="penaltyTotal" data-value="1">1</button>
            <button class="chip" data-target="penaltyTotal" data-value="2">2</button>
          </div>
        </div>
      </section>

      <section class="card" id="fwCard">
        <h3>FWキープ</h3>
        <div class="chips">
          <button class="chip" data-target="fw" data-value="true">○</button>
          <button class="chip" data-target="fw" data-value="false">×</button>
          <button class="chip" data-target="fw" data-value="null">-</button>
        </div>
      </section>

      <section class="card" id="girCard">
        <h3>グリーンオン（GIR）</h3>
        <div class="chips">
          <button class="chip" data-target="gir" data-value="true">○</button>
          <button class="chip" data-target="gir" data-value="false">×</button>
          <button class="chip" data-target="gir" data-value="null">-</button>
        </div>
      </section>

      <section class="card hidden" id="bunkerCard">
        <h3>バンカーIN</h3>
        <div class="chips">
          <button class="chip" data-target="bunker" data-value="true">○</button>
          <button class="chip" data-target="bunker" data-value="false">×</button>
          <button class="chip" data-target="bunker" data-value="null">-</button>
        </div>
      </section>

      <div class="error hidden" id="errorText"></div>
    </main>

    <div class="status" id="status">編集中</div>

    <footer class="footer">
      <button class="undo" id="undoBtn" disabled>Undo</button>
      <button class="next" id="nextBtn">次のホールへ</button>
    </footer>
  </div>

  <script>
    const parByHole = [4,4,3,5,4,3,4,5,4,4,3,4,5,4,3,4,4,5];
    const state = {
      hole: 7,
      totalHoles: 18,
      config: {
        fw: true,
        gir: true,
        ob: true,
        bunker: false,
        puttUnknown: true,
      },
      score: {
        strokes: null,
        putts: null,
        puttsUnknown: false,
        penaltyTotal: 0,
        ob: 0,
        otherPenalty: 0,
        fw: null,
        gir: null,
        bunker: null,
      },
      snapshotForUndo: null,
      undoTimer: null,
      status: "編集中",
    };

    const els = {
      holeTitle: document.getElementById("holeTitle"),
      parText: document.getElementById("parText"),
      progressFill: document.getElementById("progressFill"),
      settingsBtn: document.getElementById("settingsBtn"),
      settingsPanel: document.getElementById("settingsPanel"),
      fwValue: document.getElementById("fwValue"),
      girValue: document.getElementById("girValue"),
      obValue: document.getElementById("obValue"),
      bunkerValue: document.getElementById("bunkerValue"),
      puttUnknownValue: document.getElementById("puttUnknownValue"),
      strokesValue: document.getElementById("strokesValue"),
      puttsUnknownArea: document.getElementById("puttsUnknownArea"),
      puttsUnknownBtn: document.getElementById("puttsUnknownBtn"),
      obBlock: document.getElementById("obBlock"),
      penaltyOnlyBlock: document.getElementById("penaltyOnlyBlock"),
      penaltyTotalAuto: document.getElementById("penaltyTotalAuto"),
      fwCard: document.getElementById("fwCard"),
      girCard: document.getElementById("girCard"),
      bunkerCard: document.getElementById("bunkerCard"),
      errorText: document.getElementById("errorText"),
      status: document.getElementById("status"),
      nextBtn: document.getElementById("nextBtn"),
      undoBtn: document.getElementById("undoBtn"),
      prevBtn: document.getElementById("prevBtn"),
    };

    function currentPar() {
      return parByHole[state.hole - 1] || 4;
    }

    function deepClone(v) {
      return JSON.parse(JSON.stringify(v));
    }

    function setStatus(text, ms = 900) {
      state.status = text;
      els.status.textContent = state.status;
      if (ms > 0) {
        clearTimeout(setStatus._t);
        setStatus._t = setTimeout(() => {
          state.status = "編集中";
          els.status.textContent = state.status;
        }, ms);
      }
    }

    function parseChipValue(raw) {
      if (raw === "true") return true;
      if (raw === "false") return false;
      if (raw === "null") return null;
      return Number(raw);
    }

    function refreshOptionalVisibility() {
      const par = currentPar();
      els.fwCard.classList.toggle("hidden", !state.config.fw || par === 3);
      els.girCard.classList.toggle("hidden", !state.config.gir);
      els.bunkerCard.classList.toggle("hidden", !state.config.bunker);
      els.puttsUnknownArea.classList.toggle("hidden", !state.config.puttUnknown);

      const useOb = state.config.ob;
      els.obBlock.classList.toggle("hidden", !useOb);
      els.penaltyOnlyBlock.classList.toggle("hidden", useOb);
      if (useOb) {
        state.score.penaltyTotal = (state.score.ob || 0) + (state.score.otherPenalty || 0);
      }
    }

    function activateChip(target, value) {
      document.querySelectorAll(`[data-target="${target}"]`).forEach((btn) => {
        const v = parseChipValue(btn.dataset.value);
        btn.classList.toggle("active", v === value);
      });
    }

    function render() {
      const par = currentPar();
      els.holeTitle.textContent = `Hole ${state.hole} / ${state.totalHoles}`;
      els.parText.textContent = `Par ${par}`;
      els.progressFill.style.width = `${(state.hole / state.totalHoles) * 100}%`;

      els.strokesValue.textContent = state.score.strokes == null ? "-" : String(state.score.strokes);

      activateChip("putts", state.score.putts);
      els.puttsUnknownBtn.classList.toggle("active", state.score.puttsUnknown);

      activateChip("ob", state.score.ob);
      activateChip("otherPenalty", state.score.otherPenalty);
      activateChip("penaltyTotal", state.score.penaltyTotal);
      els.penaltyTotalAuto.textContent = String(state.score.penaltyTotal ?? 0);

      activateChip("fw", state.score.fw);
      activateChip("gir", state.score.gir);
      activateChip("bunker", state.score.bunker);

      els.fwValue.textContent = state.config.fw ? "ON" : "OFF";
      els.girValue.textContent = state.config.gir ? "ON" : "OFF";
      els.obValue.textContent = state.config.ob ? "ON" : "OFF";
      els.bunkerValue.textContent = state.config.bunker ? "ON" : "OFF";
      els.puttUnknownValue.textContent = state.config.puttUnknown ? "ON" : "OFF";

      refreshOptionalVisibility();
      validate(false);
    }

    function validate(showMessage) {
      const missing = [];
      if (state.score.strokes == null) missing.push("打数");

      const hasPutt = state.score.putts != null;
      const puttAllowedUnknown = state.config.puttUnknown && state.score.puttsUnknown;
      if (!hasPutt && !puttAllowedUnknown) missing.push("パット");

      const valid = missing.length === 0;
      els.nextBtn.disabled = !valid;

      if (showMessage && !valid) {
        els.errorText.classList.remove("hidden");
        els.errorText.textContent = `未入力: ${missing.join(" / ")}`;
      } else {
        els.errorText.classList.add("hidden");
        els.errorText.textContent = "";
      }

      return valid;
    }

    function save() {
      setStatus("保存中...", 0);
      return new Promise((resolve) => {
        setTimeout(() => {
          setStatus("保存済み", 700);
          resolve();
        }, 280);
      });
    }

    function resetForNextHole() {
      state.score = {
        strokes: null,
        putts: null,
        puttsUnknown: false,
        penaltyTotal: state.config.ob ? 0 : 0,
        ob: 0,
        otherPenalty: 0,
        fw: null,
        gir: null,
        bunker: null,
      };
    }

    function openUndoWindow() {
      clearTimeout(state.undoTimer);
      els.undoBtn.disabled = false;
      state.undoTimer = setTimeout(() => {
        els.undoBtn.disabled = true;
      }, 3000);
    }

    function bindEvents() {
      document.querySelectorAll(".step-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const step = Number(btn.dataset.step);
          const key = btn.dataset.target;
          if (state.score[key] == null) state.score[key] = 0;
          state.score[key] = Math.max(0, state.score[key] + step);
          validate(false);
          render();
        });
      });

      document.querySelectorAll("[data-target]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const target = btn.dataset.target;
          const value = parseChipValue(btn.dataset.value);
          if (target === "putts") {
            state.score.putts = value;
            state.score.puttsUnknown = false;
          } else {
            state.score[target] = value;
          }

          if (state.config.ob) {
            state.score.penaltyTotal = (state.score.ob || 0) + (state.score.otherPenalty || 0);
          }

          render();
          validate(false);
        });
      });

      els.puttsUnknownBtn.addEventListener("click", () => {
        if (!state.config.puttUnknown) return;
        state.score.puttsUnknown = !state.score.puttsUnknown;
        if (state.score.puttsUnknown) state.score.putts = null;
        render();
      });

      els.settingsBtn.addEventListener("click", () => {
        els.settingsPanel.classList.toggle("open");
      });

      els.nextBtn.addEventListener("click", async () => {
        if (!validate(true)) return;
        state.snapshotForUndo = {
          hole: state.hole,
          score: deepClone(state.score),
          config: deepClone(state.config),
        };

        await save();
        if (state.hole < state.totalHoles) {
          state.hole += 1;
          resetForNextHole();
        }
        openUndoWindow();
        render();
      });

      els.undoBtn.addEventListener("click", () => {
        if (!state.snapshotForUndo) return;
        state.hole = state.snapshotForUndo.hole;
        state.score = deepClone(state.snapshotForUndo.score);
        state.config = deepClone(state.snapshotForUndo.config);

        els.undoBtn.disabled = true;
        clearTimeout(state.undoTimer);
        setStatus("Undoしました", 800);
        render();
      });

      els.prevBtn.addEventListener("click", () => {
        if (state.hole > 1) state.hole -= 1;
        render();
      });
    }

    bindEvents();
    render();
  </script>
</body>
</html>
